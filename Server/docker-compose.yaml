services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_reviewer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  webhook-service:
    build:
      context: .
      dockerfile: app/webhook-service/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  worker-service:
    build:
      context: .
      dockerfile: app/worker-service/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  api-service:
    build:
      context: .
      dockerfile: app/api-service/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
