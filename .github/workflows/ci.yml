name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd Server && npm install

      - name: Generate Prisma client
        run: cd Server && npx prisma generate

      - name: Update tsconfig lib for ES2022
        run: |
          node -e "
            const fs = require('fs');
            const path = 'Server/tsconfig.json';
            const tsconfig = JSON.parse(fs.readFileSync(path, 'utf8'));
            tsconfig.compilerOptions = tsconfig.compilerOptions || {};
            tsconfig.compilerOptions.lib = ['ES2022', 'DOM'];
            tsconfig.compilerOptions.target = 'ES2022';
            fs.writeFileSync(path, JSON.stringify(tsconfig, null, 2));
          "

      - name: Build TypeScript
        run: cd Server && npx tsc --noEmit
